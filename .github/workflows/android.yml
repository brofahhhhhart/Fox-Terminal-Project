name: Build APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar Dependencias
        run: |
          sudo apt update
          sudo apt install -y git zip unzip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev
          pip install --user --upgrade Cython==0.29.33 buildozer

      - name: Gerar APK
        run: |
          export PATH=$PATH:$HOME/.local/bin
          # Aceita todas as licenças do Android SDK antes de começar
          yes | buildozer android debug || true 
          # Tenta rodar de novo se falhar por licença
          buildozer android debug
        
      - name: Subir APK
        uses: actions/upload-artifact@v4
        with:
          name: FoxTerminal-APK
          path: bin/*.apk
          
