name: Build APK (Kivy)

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: ☕ Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: ⚙️ Install dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            build-essential \
            git \
            zip \
            unzip \
            openjdk-17-jdk \
            python3-pip \
            libffi-dev \
            libssl-dev \
            libsqlite3-dev \
            zlib1g-dev

          pip install --upgrade pip
          pip install cython==0.29.36
          pip install buildozer

      - name: 🏗 Build APK
        run: |
          buildozer init || true

          # força config correta
          sed -i 's/^requirements = .*/requirements = python3,kivy==2.2.1,kivymd,pillow/' buildozer.spec
          sed -i 's/^# *android.api = .*/android.api = 33/' buildozer.spec
          sed -i 's/^# *android.minapi = .*/android.minapi = 21/' buildozer.spec
          sed -i 's/^# *android.ndk = .*/android.ndk = 25b/' buildozer.spec
          sed -i 's/^# *android.arch = .*/android.arch = arm64-v8a/' buildozer.spec

          buildozer android debug

      - name: 📦 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: bin/*.apk
